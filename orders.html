<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Digitizing — My Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    /* ── DASHBOARD LAYOUT ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      background: var(--glass); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: var(--fb); font-size: 22px; letter-spacing: 3px; color: var(--white); text-decoration: none; }
    .nav-user { display: flex; align-items: center; gap: 16px; font-family: var(--fm); font-size: 9px; letter-spacing: 2px; color: var(--steel); text-transform: uppercase; }
    .nav-logout { color: #ef4444; cursor: pointer; }

    main { padding-top: 120px; min-height: 100vh; }
    
    .dashboard-header { margin-bottom: 48px; }
    .dashboard-header h1 { font-family: var(--fb); font-size: clamp(40px, 8vw, 80px); line-height: 1; margin-bottom: 8px; }
    .dashboard-stats { display: flex; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 48px; }
    .stat-box { flex: 1; padding: 24px; background: var(--bg2); }
    .stat-val { font-family: var(--fb); font-size: 32px; color: var(--gold); display: block; }
    .stat-lbl { font-family: var(--fm); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }

    /* ── ORDER CARDS ── */
    .orders-grid { display: flex; flex-direction: column; gap: 16px; }
    .order-card { background: var(--bg2); border: 1px solid var(--border); padding: 24px 32px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 100px; align-items: center; gap: 20px; transition: border-color .3s; }
    .order-card:hover { border-color: var(--border2); }
    .order-id { font-family: var(--fm); font-size: 11px; color: var(--gold); }
    .order-type { font-family: var(--fm); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--steel); }
    .order-date { font-family: var(--fr); font-size: 14px; color: var(--silver); }
    .order-price { font-family: var(--fb); font-size: 20px; color: var(--white); }
    .status-pill { font-family: var(--fm); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 100px; text-align: center; }
    .status-Pending { background: rgba(244,168,80,0.1); color: var(--gold); border: 1px solid rgba(244,168,80,0.2); }
    .status-Completed { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .status-Cancelled { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

    .empty-state { text-align: center; padding: 80px 0; border: 1px dashed var(--border); }
    .empty-state p { font-family: var(--fr); font-size: 18px; color: var(--dim); margin-bottom: 24px; }

    @media (max-width: 900px) {
      .order-card { grid-template-columns: 1fr 1fr; }
      .dashboard-stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="images/Quantum_digitizing_Logo.png" alt="Quantum Digitizing" style="height: 40px; width: auto; object-fit: contain;">
    </a>
    <div class="nav-user">
      <span id="userName">Loading…</span>
      <span class="nav-logout" onclick="QD.supabase.auth.signOut(); window.location.href='index.html'">Sign Out</span>
    </div>
  </nav>

  <main class="container">
    <div class="dashboard-header">
      <h1 class="gsap-reveal">MY <span class="gold">ORDERS</span></h1>
      <p class="gsap-reveal" style="font-family:var(--fm); font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--steel)">Track your precision-crafted requests</p>
    </div>

    <div class="dashboard-stats gsap-reveal">
      <div class="stat-box"><span class="stat-val" id="statTotal">0</span><span class="stat-lbl">Total Orders</span></div>
      <div class="stat-box"><span class="stat-val" id="statPending">0</span><span class="stat-lbl">Pending</span></div>
      <div class="stat-box"><span class="stat-val" id="statCompleted">0</span><span class="stat-lbl">Delivered</span></div>
      <div class="stat-box"><span class="stat-val" id="statBalance">$0</span><span class="stat-lbl">Wallet</span></div>
    </div>

    <div class="orders-section gsap-reveal">
      <div class="orders-grid" id="ordersGrid">
        <!-- Orders will load here -->
        <div class="empty-state">
          <p>You haven't placed any orders yet.</p>
          <a href="index.html#upload" class="btn-primary"><span>Get a Free Quote →</span></a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const session = await QD.checkAuth(true);
      if (!session) return;

      const user = session.user;
      const profile = await QD.getProfile(user.id);
      document.getElementById('userName').textContent = `Hi, ${profile.data?.full_name?.split(' ')[0] || 'Member'}`;
      document.getElementById('statBalance').textContent = `$${profile.data?.wallet_balance || 0}`;

      loadOrders(user.id);
    });

    async function loadOrders(uid) {
      const { data: orders, error } = await QD.supabase
        .from('orders')
        .select('*')
        .eq('user_id', uid)
        .order('created_at', { ascending: false });

      if (error) return QD.showToast(error.message, 'error');
      
      const grid = document.getElementById('ordersGrid');
      if (!orders || orders.length === 0) return;

      grid.innerHTML = orders.map(o => `
        <div class="order-card">
          <div>
            <div class="order-id">#${o.id.slice(-8).toUpperCase()}</div>
            <div class="order-type">${o.service_type || o.order_type}</div>
          </div>
          <div class="order-date">${new Date(o.created_at).toLocaleDateString()}</div>
          <div class="order-price">$${parseFloat(o.total_price).toFixed(2)}</div>
          <div class="status-pill status-${o.status}">${o.status}</div>
          <a href="order-details.html?id=${o.id}" class="btn-secondary" style="padding:8px 16px; font-size:12px;"><span>Details</span></a>
        </div>
      `).join('');

      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statPending').textContent = orders.filter(o => o.status === 'Pending' || o.status === 'In Progress').length;
      document.getElementById('statCompleted').textContent = orders.filter(o => o.status === 'Completed').length;
    }
  </script>
</body>
</html>
